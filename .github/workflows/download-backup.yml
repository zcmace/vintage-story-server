name: Download Backup

on:
  workflow_dispatch:
    inputs:
      data_path:
        description: 'Path to game data directory on the server'
        required: false
        default: '~/vintage_story/data'

jobs:
  download-backup:
    name: Pull backup from server
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Create archive on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "tar -czf /tmp/vs-backup.tar.gz -C $(dirname ${{ inputs.data_path }}) $(basename ${{ inputs.data_path }})"

      - name: Copy archive to runner
        run: |
          scp ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/vs-backup.tar.gz ./backup.tar.gz
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "rm /tmp/vs-backup.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vs-backup-${{ github.run_id }}
          path: backup.tar.gz
          retention-days: 7
