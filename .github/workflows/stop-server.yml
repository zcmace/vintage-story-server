name: Stop Server

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  stop:
    name: Stop container then EC2 instance
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get running EC2 instance ID
        id: ec2
        run: |
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=vintage-story-server" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [ "$ID" = "None" ] || [ -z "$ID" ]; then
            echo "No running instance found — already stopped."
            exit 0
          fi
          echo "instance_id=$ID" >> $GITHUB_OUTPUT

      - name: Stop game server container gracefully
        if: steps.ec2.outputs.instance_id != ''
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["docker stop vintagestory_server"]}' \
            --output text \
            --query 'Command.CommandId')
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}"
          echo "Container stopped."

      - name: Stop EC2 instance
        if: steps.ec2.outputs.instance_id != ''
        run: |
          aws ec2 stop-instances --instance-ids "${{ steps.ec2.outputs.instance_id }}"
          aws ec2 wait instance-stopped --instance-ids "${{ steps.ec2.outputs.instance_id }}"
          echo "EC2 instance stopped."
