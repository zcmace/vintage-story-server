name: Stop Server

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  stop:
    name: Stop container then EC2 instance
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get running EC2 instance ID
        id: ec2
        run: |
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=vintage-story-server" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [ "$ID" = "None" ] || [ -z "$ID" ]; then
            echo "No running instance found — already stopped."
            exit 0
          fi
          echo "instance_id=$ID" >> $GITHUB_OUTPUT

      - name: Ensure SSM agent is online (reboot if needed)
        if: steps.ec2.outputs.instance_id != ''
        run: |
          INSTANCE_ID="${{ steps.ec2.outputs.instance_id }}"
          STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text 2>/dev/null)
          if [ "$STATUS" = "Online" ]; then
            echo "SSM agent is Online."
            exit 0
          fi
          echo "SSM agent is $STATUS — rebooting EC2 to recover..."
          aws ec2 reboot-instances --instance-ids "$INSTANCE_ID"
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          echo "Instance running. Waiting for SSM agent..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null)
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent online after reboot."
              exit 0
            fi
            echo "Attempt $i/30: SSM $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "SSM agent did not come online within 5 minutes after reboot."
          exit 1

      - name: Stop game server container gracefully
        if: steps.ec2.outputs.instance_id != ''
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["docker stop vintagestory_server"]}' \
            --output text \
            --query 'Command.CommandId')
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}"
          echo "Container stopped."

      - name: Stop EC2 instance
        if: steps.ec2.outputs.instance_id != ''
        run: |
          aws ec2 stop-instances --instance-ids "${{ steps.ec2.outputs.instance_id }}"
          aws ec2 wait instance-stopped --instance-ids "${{ steps.ec2.outputs.instance_id }}"
          echo "EC2 instance stopped."
