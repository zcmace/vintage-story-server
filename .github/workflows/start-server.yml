name: Start Server

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  start:
    name: Start EC2 instance then container
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get stopped EC2 instance ID
        id: ec2
        run: |
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=vintage-story-server" \
                      "Name=instance-state-name,Values=stopped" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [ "$ID" = "None" ] || [ -z "$ID" ]; then
            echo "No stopped instance found — may already be running."
            exit 0
          fi
          echo "instance_id=$ID" >> $GITHUB_OUTPUT

      - name: Start EC2 instance
        if: steps.ec2.outputs.instance_id != ''
        run: |
          aws ec2 start-instances --instance-ids "${{ steps.ec2.outputs.instance_id }}"
          aws ec2 wait instance-running --instance-ids "${{ steps.ec2.outputs.instance_id }}"
          echo "EC2 instance running."

      - name: Wait for SSM agent to come online
        if: steps.ec2.outputs.instance_id != ''
        run: |
          echo "Waiting for SSM agent..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${{ steps.ec2.outputs.instance_id }}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>/dev/null)
            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent online."
              exit 0
            fi
            echo "Attempt $i/30: not ready, retrying in 10s..."
            sleep 10
          done
          echo "SSM agent did not come online within 5 minutes."
          exit 1

      - name: Start all containers
        if: steps.ec2.outputs.instance_id != ''
        run: |
          PARAMS=$(jq -cn '{commands: [
            "docker start vintagestory_server",
            "docker start filebrowser 2>/dev/null || docker run -d --name filebrowser --restart unless-stopped -p 8080:8080 -v /var/vintagestory/data:/srv -v filebrowser_db:/database filebrowser/filebrowser:latest"
          ]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ec2.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --output text \
            --query 'Command.CommandId')
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ steps.ec2.outputs.instance_id }}"
          echo "All containers started."
